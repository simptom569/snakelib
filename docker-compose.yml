services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: snakelab
      POSTGRES_USER: snakelab
      POSTGRES_PASSWORD: snakelab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snakelab"]
      interval: 5s
      retries: 5
    networks:
      - snakelab-network

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - snakelab-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
    networks:
      - snakelab-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_files:/static
    depends_on:
      - backend
      - frontend
    networks:
      - snakelab-network

networks:
  snakelab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.81.0.0/24
          gateway: 172.81.0.1

volumes:
  postgres_data:
  static_files:
